<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Matriculados · Exportar Gráficos</title>
    <!-- SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- html2canvas (para capturar gráficos) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- jsPDF (para gerar PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f3f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-left: 6px solid #27ae60;
            padding-left: 16px;
        }
        .upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            background: #f0f7fb;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #3498db;
        }
        .upload-label {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-label:hover {
            background: #2980b9;
        }
        #file-info {
            color: #2c3e50;
            font-weight: 500;
            flex: 1;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 12px;
            transition: opacity 0.3s;
        }
        .filter-group {
            flex: 1 1 150px;
            min-width: 140px;
        }
        .filter-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #2c3e50;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
        }
        .filter-group select:focus, .filter-group input:focus {
            border-color: #27ae60;
            outline: none;
        }
        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            height: 38px;
        }
        .clear-btn:hover {
            background: #c0392b;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .counter {
            background: #27ae60;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .export-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .btn-export {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-export:hover {
            background: #1a252f;
        }
        .btn-export-pdf {
            background: #c0392b;
        }
        .btn-export-pdf:hover {
            background: #962d22;
        }
        /* Grid para gráficos: 2 por linha */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: #f9f9fc;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #dde4ec;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chart-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #2c3e50;
        }
        .btn-png {
            background: none;
            border: 1px solid #3498db;
            color: #3498db;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-png:hover {
            background: #3498db;
            color: white;
        }
        canvas {
            max-height: 280px;
            width: 100% !important;
            height: auto !important;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #dfe4e9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1100px;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px 6px;
            font-weight: 500;
            text-align: left;
        }
        td {
            padding: 10px 6px;
            border-bottom: 1px solid #e0e7ef;
        }
        tr:hover {
            background: #f8fafd;
        }
        .modalidade-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            background: #e8f0fe;
            color: #2c3e50;
        }
        .modalidade-badge.enem { background: #f1c40f; color: #2c3e50; }
        .modalidade-badge.especial { background: #3498db; color: white; }
        .modalidade-badge.transferência { background: #9b59b6; color: white; }
        .modalidade-badge.portador { background: #e67e22; color: white; }
        .placeholder {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-style: italic;
        }
        @media (max-width: 800px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Gestão de Matriculados · Exportar Gráficos (PNG/PDF)</h1>

    <div class="upload-area">
        <label for="file-upload" class="upload-label">📂 Selecionar Excel</label>
        <input type="file" id="file-upload" accept=".xlsx, .xls, .csv" style="display: none;">
        <span id="file-info">Nenhum arquivo carregado</span>
        <button id="reset-dados" class="clear-btn" style="background:#95a5a6;">Remover dados</button>
    </div>

    <!-- Filtros (inicialmente desabilitados) -->
    <div class="filters" id="filters-container" style="opacity:0.6; pointer-events:none;">
        <div class="filter-group">
            <label>🔍 Nome</label>
            <input type="text" id="filtroNome" placeholder="Buscar..." disabled>
        </div>
        <div class="filter-group">
            <label>🏙️ Cidade</label>
            <select id="filtroCidade" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>📍 Bairro</label>
            <select id="filtroBairro" disabled><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>📚 Curso</label>
            <select id="filtroCurso" disabled><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>📌 Modalidade</label>
            <select id="filtroModalidade" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>🏷️ Classificação</label>
            <select id="filtroClassificacao" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>🌞 Turno</label>
            <select id="filtroTurno" disabled>
                <option value="">Todos</option>
                <option value="Manhã">Manhã</option>
                <option value="Noite">Noite</option>
            </select>
        </div>
        <button class="clear-btn" id="limparFiltros" disabled>Limpar filtros</button>
    </div>

    <div class="stats">
        <span class="counter" id="contador">0 registros exibidos</span>
        <div class="export-actions" id="exportActions" style="display: none;">
            <button class="btn-export btn-export-pdf" id="exportPdfBtn">📄 Exportar todos como PDF</button>
        </div>
    </div>

    <!-- Gráficos em grid 2x2 -->
    <div class="charts-grid" id="chartsGrid" style="display: none;">
        <div class="chart-card" id="chartCidadeCard">
            <div class="chart-header">
                <h3>🏙️ Cidade (top 10)</h3>
                <button class="btn-png" data-chart="cidade">📥 PNG</button>
            </div>
            <canvas id="chartCidade"></canvas>
        </div>
        <div class="chart-card" id="chartCursoCard">
            <div class="chart-header">
                <h3>📚 Curso</h3>
                <button class="btn-png" data-chart="curso">📥 PNG</button>
            </div>
            <canvas id="chartCurso"></canvas>
        </div>
        <div class="chart-card" id="chartModalidadeCard">
            <div class="chart-header">
                <h3>📌 Modalidade</h3>
                <button class="btn-png" data-chart="modalidade">📥 PNG</button>
            </div>
            <canvas id="chartModalidade"></canvas>
        </div>
        <div class="chart-card" id="chartTurnoCard">
            <div class="chart-header">
                <h3>🌞 Turno</h3>
                <button class="btn-png" data-chart="turno">📥 PNG</button>
            </div>
            <canvas id="chartTurno"></canvas>
        </div>
    </div>

    <!-- Tabela de dados -->
    <div class="table-wrapper">
        <table id="tabelaAlunos">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Celular</th>
                <th>Cidade</th>
                <th>Bairro</th>
                <th>Classificação</th>
                <th>Curso</th>
                <th>Turno</th>
                <th>Modalidade</th>
            </tr>
            </thead>
            <tbody id="corpoTabela">
            <tr><td colspan="8" class="placeholder">Faça o upload de um arquivo Excel para começar.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
(function() {
    // Elementos DOM
    const fileInput = document.getElementById('file-upload');
    const fileInfo = document.getElementById('file-info');
    const resetBtn = document.getElementById('reset-dados');
    const filtroNome = document.getElementById('filtroNome');
    const filtroCidade = document.getElementById('filtroCidade');
    const filtroBairro = document.getElementById('filtroBairro');
    const filtroCurso = document.getElementById('filtroCurso');
    const filtroModalidade = document.getElementById('filtroModalidade');
    const filtroClassificacao = document.getElementById('filtroClassificacao');
    const filtroTurno = document.getElementById('filtroTurno');
    const limparFiltrosBtn = document.getElementById('limparFiltros');
    const contadorSpan = document.getElementById('contador');
    const tbody = document.getElementById('corpoTabela');
    const filtersContainer = document.getElementById('filters-container');
    const chartsGrid = document.getElementById('chartsGrid');
    const exportActions = document.getElementById('exportActions');
    const exportPdfBtn = document.getElementById('exportPdfBtn');

    // Gráficos
    let chartCidade, chartCurso, chartModalidade, chartTurno;

    // Dados carregados
    let dados = [];

    // ----- Utilitários -----
    function desabilitarFiltros(desabilitar = true) {
        const elementos = [filtroNome, filtroCidade, filtroBairro, filtroCurso, filtroModalidade, filtroClassificacao, filtroTurno, limparFiltrosBtn];
        elementos.forEach(el => el.disabled = desabilitar);
        filtersContainer.style.opacity = desabilitar ? '0.6' : '1';
        filtersContainer.style.pointerEvents = desabilitar ? 'none' : 'auto';
    }

    // Preenche todos os selects (exceto bairro)
    function popularFiltros() {
        // Cidade
        const cidades = [...new Set(dados.map(d => d.cidade).filter(Boolean))].sort();
        filtroCidade.innerHTML = '<option value="">Todas</option>';
        cidades.forEach(v => filtroCidade.appendChild(new Option(v, v)));

        // Curso
        const cursos = [...new Set(dados.map(d => d.curso).filter(Boolean))].sort();
        filtroCurso.innerHTML = '<option value="">Todos</option>';
        cursos.forEach(v => filtroCurso.appendChild(new Option(v, v)));

        // Modalidade
        const modalidades = [...new Set(dados.map(d => d.modalidade).filter(Boolean))].sort();
        filtroModalidade.innerHTML = '<option value="">Todas</option>';
        modalidades.forEach(v => filtroModalidade.appendChild(new Option(v, v)));

        // Classificação
        const classificacoes = [...new Set(dados.map(d => d.classificacao).filter(Boolean))].sort();
        filtroClassificacao.innerHTML = '<option value="">Todas</option>';
        classificacoes.forEach(v => filtroClassificacao.appendChild(new Option(v, v)));
    }

    // Preenche bairros conforme cidade selecionada
    function popularBairrosPorCidade(cidadeSelecionada) {
        let bairros = [];
        if (cidadeSelecionada) {
            bairros = [...new Set(dados.filter(d => d.cidade === cidadeSelecionada).map(d => d.bairro).filter(Boolean))].sort();
        } else {
            bairros = [...new Set(dados.map(d => d.bairro).filter(Boolean))].sort();
        }
        filtroBairro.innerHTML = '<option value="">Todos</option>';
        bairros.forEach(v => filtroBairro.appendChild(new Option(v, v)));
    }

    // Classe para badge de modalidade
    function classeModalidade(mod) {
        if (!mod) return '';
        const m = mod.toLowerCase();
        if (m.includes('enem')) return 'enem';
        if (m.includes('especial')) return 'especial';
        if (m.includes('transferência')) return 'transferência';
        if (m.includes('portador')) return 'portador';
        return '';
    }

    // Retorna dados filtrados
    function getDadosFiltrados() {
        const nomeFiltro = filtroNome.value.toLowerCase().trim();
        const cidadeFiltro = filtroCidade.value;
        const bairroFiltro = filtroBairro.value;
        const cursoFiltro = filtroCurso.value;
        const modalidadeFiltro = filtroModalidade.value;
        const classificacaoFiltro = filtroClassificacao.value;
        const turnoFiltro = filtroTurno.value;

        return dados.filter(item => {
            if (nomeFiltro && !(item.nome && item.nome.toLowerCase().includes(nomeFiltro))) return false;
            if (cidadeFiltro && item.cidade !== cidadeFiltro) return false;
            if (bairroFiltro && item.bairro !== bairroFiltro) return false;
            if (cursoFiltro && item.curso !== cursoFiltro) return false;
            if (modalidadeFiltro && item.modalidade !== modalidadeFiltro) return false;
            if (classificacaoFiltro && item.classificacao !== classificacaoFiltro) return false;
            if (turnoFiltro && item.turno !== turnoFiltro) return false;
            return true;
        });
    }

    // Tooltip com percentual
    function percentualTooltip(context, total) {
        const label = context.label || '';
        const value = context.raw || 0;
        const percent = total > 0 ? ((value / total) * 100).toFixed(1) : '0.0';
        return `${label}: ${value} (${percent}%)`;
    }

    // Atualiza tabela e gráficos
    function renderizarTabela() {
        const dadosFiltrados = getDadosFiltrados();
        contadorSpan.textContent = `${dadosFiltrados.length} registro(s) exibido(s)`;

        // Tabela
        tbody.innerHTML = '';
        if (dadosFiltrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:32px;">Nenhum aluno encontrado com os filtros aplicados.</td></tr>`;
        } else {
            dadosFiltrados.forEach(aluno => {
                const tr = document.createElement('tr');
                const classeMod = classeModalidade(aluno.modalidade);
                tr.innerHTML = `
                    <td>${aluno.nome || ''}</td>
                    <td>${aluno.celular || ''}</td>
                    <td>${aluno.cidade || ''}</td>
                    <td>${aluno.bairro || ''}</td>
                    <td>${aluno.classificacao || ''}</td>
                    <td>${aluno.curso || ''}</td>
                    <td>${aluno.turno || ''}</td>
                    <td><span class="modalidade-badge ${classeMod}">${aluno.modalidade || ''}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Gráficos
        atualizarGraficos(dadosFiltrados);
    }

    function atualizarGraficos(dadosFiltrados) {
        if (dadosFiltrados.length === 0) {
            chartsGrid.style.display = 'none';
            exportActions.style.display = 'none';
            return;
        }
        chartsGrid.style.display = 'grid';
        exportActions.style.display = 'flex';
        const total = dadosFiltrados.length;

        // Gráfico de Cidade (barras) - top 10
        const cidadesCount = {};
        dadosFiltrados.forEach(d => { if (d.cidade) cidadesCount[d.cidade] = (cidadesCount[d.cidade] || 0) + 1; });
        const sortedCidades = Object.entries(cidadesCount).sort((a,b) => b[1] - a[1]).slice(0,10);
        const labelsCidades = sortedCidades.map(item => item[0]);
        const dataCidades = sortedCidades.map(item => item[1]);
        if (chartCidade) chartCidade.destroy();
        chartCidade = new Chart(document.getElementById('chartCidade'), {
            type: 'bar',
            data: { labels: labelsCidades, datasets: [{ data: dataCidades, backgroundColor: '#3498db', borderRadius: 6 }] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => percentualTooltip(ctx, total) } },
                    legend: { display: false }
                },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });

        // Gráfico de Curso (barras) - TODOS os cursos
        const cursoCount = {};
        dadosFiltrados.forEach(d => { if (d.curso) cursoCount[d.curso] = (cursoCount[d.curso] || 0) + 1; });
        const sortedCursos = Object.entries(cursoCount).sort((a,b) => b[1] - a[1]);
        const labelsCursos = sortedCursos.map(item => item[0]);
        const dataCursos = sortedCursos.map(item => item[1]);
        if (chartCurso) chartCurso.destroy();
        chartCurso = new Chart(document.getElementById('chartCurso'), {
            type: 'bar',
            data: { labels: labelsCursos, datasets: [{ data: dataCursos, backgroundColor: '#2ecc71', borderRadius: 6 }] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => percentualTooltip(ctx, total) } },
                    legend: { display: false }
                },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });

        // Gráfico de Modalidade (doughnut)
        const modalCount = {};
        dadosFiltrados.forEach(d => { if (d.modalidade) modalCount[d.modalidade] = (modalCount[d.modalidade] || 0) + 1; });
        if (chartModalidade) chartModalidade.destroy();
        chartModalidade = new Chart(document.getElementById('chartModalidade'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(modalCount),
                datasets: [{ data: Object.values(modalCount), backgroundColor: ['#3498db', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c', '#2ecc71'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: (ctx) => percentualTooltip(ctx, total) } } } }
        });

        // Gráfico de Turno (pie)
        const turnoCount = {};
        dadosFiltrados.forEach(d => { if (d.turno) turnoCount[d.turno] = (turnoCount[d.turno] || 0) + 1; });
        if (chartTurno) chartTurno.destroy();
        chartTurno = new Chart(document.getElementById('chartTurno'), {
            type: 'pie',
            data: {
                labels: Object.keys(turnoCount),
                datasets: [{ data: Object.values(turnoCount), backgroundColor: ['#2ecc71', '#e74c3c'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: (ctx) => percentualTooltip(ctx, total) } } } }
        });
    }

    // Reseta filtros
    function resetFiltros() {
        filtroNome.value = '';
        filtroCidade.value = '';
        popularBairrosPorCidade('');
        filtroCurso.value = '';
        filtroModalidade.value = '';
        filtroClassificacao.value = '';
        filtroTurno.value = '';
    }

    // Carrega novos dados
    function setDados(novosDados) {
        dados = novosDados.filter(item => item.nome || item.celular);
        if (dados.length > 0) {
            popularFiltros();
            popularBairrosPorCidade('');
            resetFiltros();
            renderizarTabela();
            desabilitarFiltros(false);
            fileInfo.textContent = `${dados.length} registros carregados`;
        } else {
            dados = [];
            tbody.innerHTML = `<tr><td colspan="8" class="placeholder">Nenhum registro encontrado na planilha.</td></tr>`;
            contadorSpan.textContent = '0 registros exibidos';
            desabilitarFiltros(true);
            chartsGrid.style.display = 'none';
            exportActions.style.display = 'none';
            fileInfo.textContent = 'Arquivo vazio ou inválido';
        }
    }

    // Processa Excel
    function processarArquivo(arquivo) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const linhas = XLSX.utils.sheet_to_json(firstSheet, { header: 0 });

                const dadosImportados = linhas.map(linha => ({
                    nome: linha['Nome'] || linha['nome'] || '',
                    celular: linha['Celular'] || linha['celular'] !== undefined ? String(linha['Celular'] || linha['celular'] || '') : '',
                    cidade: linha['Cidade'] || linha['cidade'] || '',
                    bairro: linha['Bairro'] || linha['bairro'] || '',
                    classificacao: linha['Classificação'] || linha['classificação'] || linha['Classificacao'] || '',
                    curso: linha['Curso'] || linha['curso'] || '',
                    turno: linha['Turno'] || linha['turno'] || '',
                    modalidade: linha['Modalidade'] || linha['modalidade'] || ''
                }));

                setDados(dadosImportados);
            } catch (error) {
                alert('Erro ao processar: ' + error.message);
                setDados([]);
            }
        };
        reader.readAsArrayBuffer(arquivo);
    }

    // ---------- Exportação PNG ----------
    document.querySelectorAll('.btn-png').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const chartType = this.dataset.chart;
            let canvasId, fileName;
            switch(chartType) {
                case 'cidade': canvasId = 'chartCidade'; fileName = 'cidade.png'; break;
                case 'curso': canvasId = 'chartCurso'; fileName = 'curso.png'; break;
                case 'modalidade': canvasId = 'chartModalidade'; fileName = 'modalidade.png'; break;
                case 'turno': canvasId = 'chartTurno'; fileName = 'turno.png'; break;
                default: return;
            }
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    });

    // ---------- Exportação PDF (todos os gráficos) ----------
    exportPdfBtn.addEventListener('click', async function() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');
        const cards = ['chartCidadeCard', 'chartCursoCard', 'chartModalidadeCard', 'chartTurnoCard'];
        
        for (let i = 0; i < cards.length; i++) {
            const card = document.getElementById(cards[i]);
            if (!card) continue;
            
            // Capturar o card inteiro (incluindo título e gráfico)
            const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#f9f9fc' });
            const imgData = canvas.toDataURL('image/png');
            
            // Adicionar ao PDF (pular para nova página após o primeiro)
            if (i > 0) pdf.addPage();
            
            // Calcular dimensões para caber na página (largura máxima 260mm, altura proporcional)
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const imgWidth = pageWidth - 20; // margem
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            // Centralizar verticalmente se couber
            let y = 10;
            if (imgHeight < pageHeight - 20) {
                y = (pageHeight - imgHeight) / 2;
            }
            
            pdf.addImage(imgData, 'PNG', 10, y, imgWidth, imgHeight);
        }
        
        pdf.save('graficos_matriculados.pdf');
    });

    // Eventos
    fileInput.addEventListener('change', (e) => {
        const arquivo = e.target.files[0];
        if (!arquivo) return;
        fileInfo.textContent = `Carregando: ${arquivo.name} ...`;
        processarArquivo(arquivo);
        fileInput.value = '';
    });

    resetBtn.addEventListener('click', () => {
        setDados([]);
        fileInfo.textContent = 'Nenhum arquivo carregado';
        tbody.innerHTML = `<tr><td colspan="8" class="placeholder">Faça o upload de um arquivo Excel para começar.</td></tr>`;
        contadorSpan.textContent = '0 registros exibidos';
        desabilitarFiltros(true);
        chartsGrid.style.display = 'none';
        exportActions.style.display = 'none';
    });

    filtroCidade.addEventListener('change', () => {
        popularBairrosPorCidade(filtroCidade.value);
        if (filtroBairro.value && !Array.from(filtroBairro.options).some(opt => opt.value === filtroBairro.value)) {
            filtroBairro.value = '';
        }
        renderizarTabela();
    });

    filtroNome.addEventListener('input', renderizarTabela);
    filtroBairro.addEventListener('change', renderizarTabela);
    filtroCurso.addEventListener('change', renderizarTabela);
    filtroModalidade.addEventListener('change', renderizarTabela);
    filtroClassificacao.addEventListener('change', renderizarTabela);
    filtroTurno.addEventListener('change', renderizarTabela);
    limparFiltrosBtn.addEventListener('click', () => {
        resetFiltros();
        renderizarTabela();
    });

    // Inicialização
    desabilitarFiltros(true);
    chartsGrid.style.display = 'none';
    exportActions.style.display = 'none';
})();
</script>
</body>
</html>
