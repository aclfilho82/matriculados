<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Matriculados · Upload + Filtros + Gráficos</title>
    <!-- SheetJS (XLSX) para ler planilhas -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f3f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            font-weight: 600;
            border-left: 6px solid #27ae60;
            padding-left: 16px;
        }
        .upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            background: #f0f7fb;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #3498db;
        }
        .upload-label {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
        }
        .upload-label:hover {
            background: #2980b9;
        }
        #file-info {
            color: #2c3e50;
            font-weight: 500;
            flex: 1;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 12px;
            transition: opacity 0.3s;
        }
        .filter-group {
            flex: 1 1 160px;
            min-width: 140px;
        }
        .filter-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #2c3e50;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
            background: white;
        }
        .filter-group select:focus, .filter-group input:focus {
            border-color: #27ae60;
            outline: none;
        }
        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: 0.2s;
            height: 38px;
            font-size: 0.9rem;
        }
        .clear-btn:hover {
            background: #c0392b;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .counter {
            background: #27ae60;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .chart-card {
            flex: 1 1 300px;
            background: #f9f9fc;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #dde4ec;
        }
        .chart-card h3 {
            margin: 0 0 12px 0;
            font-size: 1rem;
            color: #2c3e50;
            text-align: center;
        }
        canvas {
            max-height: 250px;
            max-width: 100%;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #dfe4e9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1000px;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px 6px;
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
        }
        td {
            padding: 10px 6px;
            border-bottom: 1px solid #e0e7ef;
        }
        tr:hover {
            background: #f8fafd;
        }
        .modalidade-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            background: #e8f0fe;
            color: #2c3e50;
        }
        .modalidade-badge.enem { background: #f1c40f; color: #2c3e50; }
        .modalidade-badge.especial { background: #3498db; color: white; }
        .modalidade-badge.transferência { background: #9b59b6; color: white; }
        .modalidade-badge.portador { background: #e67e22; color: white; }
        .placeholder {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Gestão de Matriculados · Upload + Filtros + Gráficos</h1>

    <!-- Área de upload -->
    <div class="upload-area">
        <label for="file-upload" class="upload-label">📂 Selecionar arquivo Excel</label>
        <input type="file" id="file-upload" accept=".xlsx, .xls, .csv" style="display: none;">
        <span id="file-info">Nenhum arquivo carregado</span>
        <button id="reset-dados" class="clear-btn" style="background:#95a5a6;">Remover dados</button>
    </div>

    <!-- Filtros (desabilitados enquanto não há dados) -->
    <div class="filters" id="filters-container" style="opacity:0.6; pointer-events:none;">
        <div class="filter-group">
            <label>🔍 Nome</label>
            <input type="text" id="filtroNome" placeholder="Buscar..." disabled>
        </div>
        <div class="filter-group">
            <label>🏙️ Cidade</label>
            <select id="filtroCidade" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>📍 Bairro</label>
            <select id="filtroBairro" disabled><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>📌 Modalidade</label>
            <select id="filtroModalidade" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>🏷️ Classificação</label>
            <select id="filtroClassificacao" disabled><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
            <label>🌞 Turno</label>
            <select id="filtroTurno" disabled>
                <option value="">Todos</option>
                <option value="Manhã">Manhã</option>
                <option value="Noite">Noite</option>
            </select>
        </div>
        <button class="clear-btn" id="limparFiltros" disabled>Limpar filtros</button>
    </div>

    <!-- Estatísticas e contador -->
    <div class="stats">
        <span class="counter" id="contador">0 registros exibidos</span>
    </div>

    <!-- Gráficos dinâmicos -->
    <div class="charts-row" id="chartsRow" style="display: none;">
        <div class="chart-card">
            <h3>📊 Distribuição por Cidade</h3>
            <canvas id="chartCidade"></canvas>
        </div>
        <div class="chart-card">
            <h3>📊 Distribuição por Modalidade</h3>
            <canvas id="chartModalidade"></canvas>
        </div>
        <div class="chart-card">
            <h3>📊 Distribuição por Turno</h3>
            <canvas id="chartTurno"></canvas>
        </div>
    </div>

    <!-- Tabela de dados -->
    <div class="table-wrapper">
        <table id="tabelaAlunos">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Celular</th>
                <th>Cidade</th>
                <th>Bairro</th>
                <th>Classificação</th>
                <th>Curso</th>
                <th>Turno</th>
                <th>Modalidade</th>
            </tr>
            </thead>
            <tbody id="corpoTabela">
            <tr><td colspan="8" class="placeholder">Faça o upload de um arquivo Excel para começar.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
(function() {
    // ---------- Elementos DOM ----------
    const fileInput = document.getElementById('file-upload');
    const fileInfo = document.getElementById('file-info');
    const resetBtn = document.getElementById('reset-dados');
    const filtroNome = document.getElementById('filtroNome');
    const filtroCidade = document.getElementById('filtroCidade');
    const filtroBairro = document.getElementById('filtroBairro');
    const filtroModalidade = document.getElementById('filtroModalidade');
    const filtroClassificacao = document.getElementById('filtroClassificacao');
    const filtroTurno = document.getElementById('filtroTurno');
    const limparFiltrosBtn = document.getElementById('limparFiltros');
    const contadorSpan = document.getElementById('contador');
    const tbody = document.getElementById('corpoTabela');
    const filtersContainer = document.getElementById('filters-container');
    const chartsRow = document.getElementById('chartsRow');

    // Gráficos (Chart.js)
    let chartCidade, chartModalidade, chartTurno;

    // Estado dos dados
    let dados = [];

    // Armazenar bairros por cidade para atualização dinâmica
    let bairrosPorCidade = {};

    // ---------- Funções auxiliares ----------
    function desabilitarFiltros(desabilitar = true) {
        const elementos = [filtroNome, filtroCidade, filtroBairro, filtroModalidade, filtroClassificacao, filtroTurno, limparFiltrosBtn];
        elementos.forEach(el => el.disabled = desabilitar);
        filtersContainer.style.opacity = desabilitar ? '0.6' : '1';
        filtersContainer.style.pointerEvents = desabilitar ? 'none' : 'auto';
    }

    // Atualiza todos os selects com valores únicos dos dados atuais (exceto bairro, que será tratado separadamente)
    function popularFiltros() {
        // Cidade
        const cidades = [...new Set(dados.map(d => d.cidade).filter(Boolean))].sort((a,b) => a.localeCompare(b));
        filtroCidade.innerHTML = '<option value="">Todas</option>';
        cidades.forEach(v => filtroCidade.appendChild(new Option(v, v)));

        // Modalidade
        const modalidades = [...new Set(dados.map(d => d.modalidade).filter(Boolean))].sort((a,b) => a.localeCompare(b));
        filtroModalidade.innerHTML = '<option value="">Todas</option>';
        modalidades.forEach(v => filtroModalidade.appendChild(new Option(v, v)));

        // Classificação
        const classificacoes = [...new Set(dados.map(d => d.classificacao).filter(Boolean))].sort((a,b) => a.localeCompare(b));
        filtroClassificacao.innerHTML = '<option value="">Todas</option>';
        classificacoes.forEach(v => filtroClassificacao.appendChild(new Option(v, v)));

        // Turno já é fixo

        // Construir mapa de bairros por cidade
        bairrosPorCidade = {};
        dados.forEach(item => {
            if (item.cidade && item.bairro) {
                if (!bairrosPorCidade[item.cidade]) {
                    bairrosPorCidade[item.cidade] = new Set();
                }
                bairrosPorCidade[item.cidade].add(item.bairro);
            }
        });
        // Converter Sets para arrays ordenados
        for (let cidade in bairrosPorCidade) {
            bairrosPorCidade[cidade] = Array.from(bairrosPorCidade[cidade]).sort((a,b) => a.localeCompare(b));
        }

        // Inicialmente, mostrar todos os bairros (sem filtro de cidade)
        atualizarBairros();
    }

    // Atualiza o select de bairros com base na cidade selecionada
    function atualizarBairros() {
        const cidadeSelecionada = filtroCidade.value;
        filtroBairro.innerHTML = '<option value="">Todos</option>';

        let bairros = [];
        if (cidadeSelecionada && bairrosPorCidade[cidadeSelecionada]) {
            bairros = bairrosPorCidade[cidadeSelecionada];
        } else if (!cidadeSelecionada) {
            // Se nenhuma cidade selecionada, mostrar todos os bairros (únicos)
            const todosBairros = new Set();
            dados.forEach(d => { if (d.bairro) todosBairros.add(d.bairro); });
            bairros = Array.from(todosBairros).sort((a,b) => a.localeCompare(b));
        }
        bairros.forEach(b => filtroBairro.appendChild(new Option(b, b)));
    }

    function classeModalidade(mod) {
        if (!mod) return '';
        const m = mod.toLowerCase();
        if (m.includes('enem')) return 'enem';
        if (m.includes('especial')) return 'especial';
        if (m.includes('transferência')) return 'transferência';
        if (m.includes('portador')) return 'portador';
        return '';
    }

    // Renderiza tabela com base nos filtros atuais
    function renderizarTabela() {
        const nomeFiltro = filtroNome.value.toLowerCase().trim();
        const cidadeFiltro = filtroCidade.value;
        const bairroFiltro = filtroBairro.value;
        const modalidadeFiltro = filtroModalidade.value;
        const classificacaoFiltro = filtroClassificacao.value;
        const turnoFiltro = filtroTurno.value;

        const dadosFiltrados = dados.filter(item => {
            if (nomeFiltro && !(item.nome && item.nome.toLowerCase().includes(nomeFiltro))) return false;
            if (cidadeFiltro && item.cidade !== cidadeFiltro) return false;
            if (bairroFiltro && item.bairro !== bairroFiltro) return false;
            if (modalidadeFiltro && item.modalidade !== modalidadeFiltro) return false;
            if (classificacaoFiltro && item.classificacao !== classificacaoFiltro) return false;
            if (turnoFiltro && item.turno !== turnoFiltro) return false;
            return true;
        });

        contadorSpan.textContent = `${dadosFiltrados.length} registro(s) exibido(s)`;

        // Atualiza tabela
        tbody.innerHTML = '';
        if (dadosFiltrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:32px;">Nenhum aluno encontrado com os filtros aplicados.</td></tr>`;
        } else {
            dadosFiltrados.forEach(aluno => {
                const tr = document.createElement('tr');
                const classeMod = classeModalidade(aluno.modalidade);
                tr.innerHTML = `
                    <td>${aluno.nome || ''}</td>
                    <td>${aluno.celular || ''}</td>
                    <td>${aluno.cidade || ''}</td>
                    <td>${aluno.bairro || ''}</td>
                    <td>${aluno.classificacao || ''}</td>
                    <td>${aluno.curso || ''}</td>
                    <td>${aluno.turno || ''}</td>
                    <td><span class="modalidade-badge ${classeMod}">${aluno.modalidade || ''}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Atualiza gráficos com os dados filtrados
        atualizarGraficos(dadosFiltrados);
    }

    // Atualiza os gráficos (Chart.js)
    function atualizarGraficos(dadosFiltrados) {
        if (dadosFiltrados.length === 0) {
            chartsRow.style.display = 'none';
            return;
        }
        chartsRow.style.display = 'flex';

        // Gráfico de Cidade (top 8 para não poluir)
        const cidadesCount = {};
        dadosFiltrados.forEach(d => { if (d.cidade) cidadesCount[d.cidade] = (cidadesCount[d.cidade] || 0) + 1; });
        const sortedCidades = Object.entries(cidadesCount).sort((a,b) => b[1] - a[1]).slice(0,8);
        const labelsCidades = sortedCidades.map(item => item[0]);
        const dataCidades = sortedCidades.map(item => item[1]);

        if (chartCidade) chartCidade.destroy();
        chartCidade = new Chart(document.getElementById('chartCidade'), {
            type: 'bar',
            data: {
                labels: labelsCidades,
                datasets: [{
                    label: 'Quantidade',
                    data: dataCidades,
                    backgroundColor: '#3498db',
                    borderRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Gráfico de Modalidade
        const modalCount = {};
        dadosFiltrados.forEach(d => { if (d.modalidade) modalCount[d.modalidade] = (modalCount[d.modalidade] || 0) + 1; });
        if (chartModalidade) chartModalidade.destroy();
        chartModalidade = new Chart(document.getElementById('chartModalidade'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(modalCount),
                datasets: [{
                    data: Object.values(modalCount),
                    backgroundColor: ['#3498db', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Gráfico de Turno
        const turnoCount = {};
        dadosFiltrados.forEach(d => { if (d.turno) turnoCount[d.turno] = (turnoCount[d.turno] || 0) + 1; });
        if (chartTurno) chartTurno.destroy();
        chartTurno = new Chart(document.getElementById('chartTurno'), {
            type: 'pie',
            data: {
                labels: Object.keys(turnoCount),
                datasets: [{
                    data: Object.values(turnoCount),
                    backgroundColor: ['#2ecc71', '#e74c3c']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Limpa os campos de filtro
    function resetFiltros() {
        filtroNome.value = '';
        filtroCidade.value = '';
        filtroBairro.innerHTML = '<option value="">Todos</option>'; // limpa e recria depois
        filtroModalidade.value = '';
        filtroClassificacao.value = '';
        filtroTurno.value = '';
        // Ao resetar cidade, precisamos atualizar bairros para todos
        atualizarBairros();
    }

    // Carrega novos dados e atualiza interface
    function setDados(novosDados) {
        dados = novosDados.filter(item => item.nome || item.celular); // remove linhas vazias
        if (dados.length > 0) {
            popularFiltros();
            resetFiltros(); // Isso já chama atualizarBairros internamente
            renderizarTabela();
            desabilitarFiltros(false);
            fileInfo.textContent = `${dados.length} registros carregados`;
        } else {
            dados = [];
            tbody.innerHTML = `<tr><td colspan="8" class="placeholder">Nenhum registro encontrado na planilha.</td></tr>`;
            contadorSpan.textContent = `0 registros exibidos`;
            desabilitarFiltros(true);
            chartsRow.style.display = 'none';
            fileInfo.textContent = 'Arquivo vazio ou inválido';
        }
    }

    // Processa o arquivo Excel com SheetJS
    function processarArquivo(arquivo) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const linhas = XLSX.utils.sheet_to_json(worksheet, { header: 0 });

                const dadosImportados = linhas.map(linha => ({
                    nome: linha['Nome'] || linha['nome'] || '',
                    celular: linha['Celular'] || linha['celular'] !== undefined ? String(linha['Celular'] || linha['celular'] || '') : '',
                    cidade: linha['Cidade'] || linha['cidade'] || '',
                    bairro: linha['Bairro'] || linha['bairro'] || '',
                    classificacao: linha['Classificação'] || linha['classificação'] || linha['Classificacao'] || '',
                    curso: linha['Curso'] || linha['curso'] || '',
                    turno: linha['Turno'] || linha['turno'] || '',
                    modalidade: linha['Modalidade'] || linha['modalidade'] || ''
                }));

                setDados(dadosImportados);
            } catch (error) {
                alert('Erro ao processar o arquivo: ' + error.message);
                setDados([]);
            }
        };
        reader.readAsArrayBuffer(arquivo);
    }

    // ---------- Event listeners ----------
    fileInput.addEventListener('change', (e) => {
        const arquivo = e.target.files[0];
        if (!arquivo) return;
        fileInfo.textContent = `Carregando: ${arquivo.name} ...`;
        processarArquivo(arquivo);
        fileInput.value = ''; // permite recarregar o mesmo arquivo
    });

    resetBtn.addEventListener('click', () => {
        setDados([]);
        fileInfo.textContent = 'Nenhum arquivo carregado';
        tbody.innerHTML = `<tr><td colspan="8" class="placeholder">Faça o upload de um arquivo Excel para começar.</td></tr>`;
        contadorSpan.textContent = '0 registros exibidos';
        desabilitarFiltros(true);
        chartsRow.style.display = 'none';
    });

    // Filtros
    filtroNome.addEventListener('input', renderizarTabela);
    filtroCidade.addEventListener('change', () => {
        atualizarBairros();   // atualiza bairros conforme cidade
        renderizarTabela();   // reaplica filtros
    });
    filtroBairro.addEventListener('change', renderizarTabela);
    filtroModalidade.addEventListener('change', renderizarTabela);
    filtroClassificacao.addEventListener('change', renderizarTabela);
    filtroTurno.addEventListener('change', renderizarTabela);
    limparFiltrosBtn.addEventListener('click', () => {
        resetFiltros();
        renderizarTabela();
    });

    // Inicialmente sem dados
    desabilitarFiltros(true);
    chartsRow.style.display = 'none';
})();
</script>
</body>
</html>
